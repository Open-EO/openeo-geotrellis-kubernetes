# Default values for openeo-workspaces-api
# This is a YAML-formatted file.

# Replica count
replicaCount: 3

# Image configuration
image:
  repository: vito-docker.artifactory.vgt.vito.be/workspace-service-openeo
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8000
  annotations: {}

# Ingress configuration
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: openeo.example.com
      paths:
        - path: /api/v1
          pathType: Prefix
  tls: []

# Resources
resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Node selection
nodeSelector: {}
tolerations: []
affinity: {}

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Application configuration
config:
  debug: false
  apiVersion: v1

  # Workspace configuration
  defaultWorkspaceProvider: s3
  maxWorkspaceQuota: 1099511627776  # 1TB in bytes
  supportedProviders: ["s3"]

# KeyCloak configuration
keycloak:
  external:
    enabled: true
    serverUrl: https://keycloak.example.com
    realm: openeo
    clientId: openeo-workspaces
    clientSecret: ""

# Elasticsearch configuration
elasticsearch:
  external:
    enabled: false
    host: elasticsearch.example.com
    port: 9200
    scheme: https
    username: elastic
    password: ""

# Persistent storage
persistence:
  enabled: false
  storageClass: "standard"
  size: 10Gi
  mountPath: /app/data

# Environment variables
env:
  - name: LOG_LEVEL
    value: INFO
  - name: PYTHONUNBUFFERED
    value: "1"

# Secrets (these will be filled in via CI/CD or secret management)
secrets:
  keycloakClientSecret: ""
  elasticsearchPassword: ""

# Network Policy
networkPolicy:
  enabled: false
  ingress:
    - from: []

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1


# Additonal env vars which are secret if provided they are
# stored in a secret but exposed as env vars
secretEnvVars:
  secretName: openeo-workspace-service-env-vars
  # If envVars values are provided the secret is created otherwise the
  # secret is assumed pre-provided and the env vars are just
  vars: {}